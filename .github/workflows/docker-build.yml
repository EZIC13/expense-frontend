name: Build and Publish Docker Image

on:
  workflow_dispatch:

jobs:
  publish_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build . --build-arg ${{ secrets.ENV_API_NAME }}=${{ secrets.ENV_API_VALUE }} -t ghcr.io/${{ secrets.GH_USER }}/expense-frontend:latest

      - name: Push image
        run: docker push ghcr.io/${{ secrets.GH_USER }}/expense-frontend:latest